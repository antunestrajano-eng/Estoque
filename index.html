<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Resumo e Separação — Confiance Energy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1020;
            --panel: #111a33;
            --text: #e7ecff;
            --muted: #aab3d6;
            --brand: #FFD700;
            --accent: #FFB300;
            --azul: #2940A0;
            --good: #57f287;
            --danger: #ff6b6b;
            --border: rgba(255, 255, 255, .10);
            --shadow: 0 10px 30px rgba(0, 0, 0, .35);
            --radius: 18px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(1200px 600px at 20% 0%, rgba(255, 215, 0, .08), transparent 60%),
                radial-gradient(900px 500px at 80% 10%, rgba(255, 179, 0, .06), transparent 55%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(16px);
            background: linear-gradient(to bottom, rgba(11, 16, 32, .95), rgba(11, 16, 32, .75));
            border-bottom: 1px solid var(--border);
        }
        .wrap { max-width: 1280px; margin: 0 auto; padding: 20px 28px 28px; }
        .header-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .brand { display: flex; align-items: center; gap: 14px; }
        .logo {
            height: 52px;
            width: auto;
            object-fit: contain;
            flex-shrink: 0;
            filter: drop-shadow(0 0 8px rgba(255,215,0,.25));
        }
        h1 { font-size: 17px; font-weight: 800; letter-spacing: -.02em; }
        .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }

        .rank-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .rank-tab {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255,255,255,.04);
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .rank-tab:hover { border-color: rgba(255,215,0,.3); color: var(--text); }
        .rank-tab.active {
            background: rgba(255,215,0,.12);
            border-color: rgba(255,215,0,.5);
            color: var(--brand);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .025));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-top: 16px;
            overflow: hidden;
        }
        .card .hd {
            padding: 18px 18px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 { font-size: 15px; font-weight: 700; }
        .card .bd { padding: 18px; }

        .tableWrap {
            max-height: 450px;
            overflow: auto;
            border-radius: 14px;
            margin-top: 14px;
            border: 1px solid var(--border);
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            text-align: left;
            font-size: 11px;
            color: var(--muted);
            background: rgba(255, 255, 255, .05);
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            font-size: 13px;
        }
        tbody tr { transition: background .2s; }
        tbody tr:hover { filter: brightness(1.08); }

        /* ── Estoque: badges de status ── */
        .estq-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .04em;
        }
        .estq-ok      { background: rgba(34,197,94,.18);  color: #22c55e; }
        .estq-medio   { background: rgba(245,158,11,.18); color: #f59e0b; }
        .estq-critico { background: rgba(239,68,68,.20);  color: #ef4444; }

        /* ── Estoque: legenda inferior ── */
        .estq-legenda {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 14px;
            padding: 10px 16px;
            background: rgba(255,255,255,.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 12px;
            color: var(--muted);
        }
        .estq-leg-item { display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .estq-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .estq-leg-detalhe { color: var(--muted); opacity: .75; }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .filter-bar label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .filter-select {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: border-color .2s, box-shadow .2s;
            min-width: 200px;
        }
        .filter-select:hover { border-color: rgba(255,215,0,.3); }
        .filter-select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(255,215,0,.15);
        }
        .filter-select option { background: #1a2040; color: var(--text); }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 6px;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
        }
        .form-group input[type="text"]:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(255,215,0,.15);
        }
        .form-group select { width: 100%; }
        .form-group .filter-select { min-width: 0; width: 100%; }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .btn:disabled { opacity: .6; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--accent));
            color: #0b1020;
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 4px 16px rgba(255, 179, 0, .35);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-secondary:hover:not(:disabled) {
            border-color: rgba(255,215,0,.3);
            background: rgba(255,215,0,.08);
        }
        .btn-success {
            background: rgba(87, 242, 135, .2);
            border: 1px solid rgba(87, 242, 135, .4);
            color: var(--good);
        }
        .btn-success:hover:not(:disabled) { background: rgba(87, 242, 135, .3); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }

        .msg {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 14px;
            font-size: 13px;
            line-height: 1.5;
        }
        .msg.ok {
            background: rgba(87, 242, 135, .08);
            border: 1px solid rgba(87, 242, 135, .25);
            color: var(--good);
        }
        .msg.err {
            background: rgba(255, 107, 107, .08);
            border: 1px solid rgba(255, 107, 107, .25);
            color: var(--danger);
        }

        .sep-row {
            display: grid;
            grid-template-columns: 80px 1fr 44px;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .03);
            transition: background .2s;
        }
        .sep-row:hover { background: rgba(255, 215, 0, .04); }
        .sep-row input[type="number"] {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }
        .sep-row select { padding: 8px 12px; min-width: 0; }
        .sep-row .btn-remove {
            padding: 8px 12px;
            border: 1px solid rgba(255, 107, 107, .3);
            border-radius: 8px;
            background: rgba(255, 107, 107, .1);
            color: var(--danger);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            line-height: 1;
        }
        .sep-row .btn-remove:hover { background: rgba(255, 107, 107, .2); }
        .sep-lista { margin-top: 14px; }
        .sep-cliente {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .sep-cliente strong { color: var(--text); }
        .btn-add-item {
            margin-top: 12px;
            padding: 8px 14px;
            border: 1px dashed rgba(255, 215, 0, .4);
            border-radius: 10px;
            background: rgba(255, 215, 0, .06);
            color: var(--brand);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-add-item:hover { background: rgba(255, 215, 0, .12); border-style: solid; }

        .empty { color: var(--muted); font-style: italic; padding: 1.5rem; font-size: 13px; }
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
            color: var(--muted);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid var(--border);
            border-top-color: var(--brand);
            animation: spin .8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn .5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: none; }
        }
        @media (max-width: 640px) {
            .wrap { padding: 12px 14px 20px; }
            .sep-row { grid-template-columns: 60px 1fr 40px; gap: 8px; padding: 10px 12px; }
            .form-grid { grid-template-columns: 1fr; }
        }

        /* ── Login overlay ── */
        #loginOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
        }
        #loginBox {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 40px 36px;
            width: 100%; max-width: 380px;
            box-shadow: 0 24px 60px rgba(0,0,0,.5);
            text-align: center;
        }
        #loginBox img { height: 48px; margin-bottom: 20px; }
        #loginBox h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        #loginBox p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
        #loginInput {
            width: 100%; padding: 12px 14px;
            background: var(--bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 10px;
            font-size: 15px; margin-bottom: 14px;
            outline: none; box-sizing: border-box;
        }
        #loginInput:focus { border-color: var(--brand); }
        #loginBtn {
            width: 100%; padding: 12px;
            background: var(--brand); color: #111;
            border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }
        #loginBtn:hover { background: var(--accent); }
        #loginErr {
            color: #ef4444; font-size: 13px;
            margin-top: 10px; min-height: 18px;
        }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="loginOverlay">
        <div id="loginBox">
            <h2>Gestão de Estoque</h2>
            <p>Confiance Energy — acesso restrito</p>
            <input id="loginInput" type="password" placeholder="Senha" autocomplete="current-password" />
            <button id="loginBtn">Entrar</button>
            <div id="loginErr"></div>
        </div>
    </div>

    <script>
        /* ── Auth ── */
        (function() {
            var _k = atob('Q29uZmlhbmNlQDI2MjY='); // Confiance@2626
            var SK = 'ce_auth_ok';
            var overlay = document.getElementById('loginOverlay');
            var input   = document.getElementById('loginInput');
            var btn     = document.getElementById('loginBtn');
            var err     = document.getElementById('loginErr');

            function unlock() { overlay.style.display = 'none'; }
            function tryLogin() {
                if (input.value === _k) {
                    sessionStorage.setItem(SK, '1');
                    unlock();
                } else {
                    err.textContent = 'Senha incorreta.';
                    input.value = '';
                    input.focus();
                }
            }

            if (sessionStorage.getItem(SK) === '1') { unlock(); }
            btn.addEventListener('click', tryLogin);
            input.addEventListener('keydown', function(e) { if (e.key === 'Enter') tryLogin(); });
            setTimeout(function() { if (overlay.style.display !== 'none') input.focus(); }, 100);
        })();

        var baseUrl = 'https://script.google.com/macros/s/AKfycbzZktaKHFiBiFGOFyZ9U1ByVs9Mf3HXOf5h5y5MWINQpBtj1zMQdWqmS-UcfgVJnrJG/exec';
        function api(action, params) {
            var q = (params && typeof params === 'object') ? Object.keys(params).map(function(k) {
                return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
            }).join('&') : '';
            var url = baseUrl + (action ? '?action=' + encodeURIComponent(action) + (q ? '&' + q : '') : (q ? '?' + q : ''));
            return fetch(url).then(function(r) { return r.json(); });
        }

        document.querySelectorAll('.rank-tab').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.rank-tab').forEach(function(b) { b.classList.remove('active'); });

                btn.classList.add('active');
                var id = btn.getAttribute('data-tab');
                var panel = document.getElementById(id);
                if (panel) panel.classList.add('active');
                if (id === 'estoque') carregarEstoque();
                if (id === 'entradas') { preencherDropdownEntrada(); carregarEntradas(); }
                if (id === 'saidas') { preencherDropdownSaida(); carregarSaidas(); }
                if (id === 'resumo') carregarResumos();
                if (id === 'separacao') carregarSeparacaoLista();
            });

        function showMsg(elId, text, isErr) {
            var el = document.getElementById(elId);
            if (!el) return;
            el.innerHTML = text ? '<div class="msg ' + (isErr ? 'err' : 'ok') + '">' + text + '</div>' : '';
        }

        function carregarAba(action, wrapId, msgId, loadingLabel) {
            var wrap = document.getElementById(wrapId);
            var msgEl = document.getElementById(msgId);
            wrap.innerHTML = '<div class="loading-screen"><div class="spinner"></div><p>' + (loadingLabel || 'Carregando…') + '</p></div>';
            api(action).then(function(res) {
                if (!res.ok) { showMsg(msgId, res.message || 'Erro ao carregar.', true); wrap.innerHTML = ''; return; }
                showMsg(msgId, '');
                var h = res.headers || [];
                var rows = res.rows || [];
                if (!rows.length) { wrap.innerHTML = '<p class="empty">Nenhum dado nesta aba.</p>'; return; }
                var html = '<div class="tableWrap"><table><thead><tr>';
                h.forEach(function(c) { html += '<th>' + (c || '').replace(/</g,'&lt;') + '</th>'; });
                html += '</tr></thead><tbody>';
                rows.forEach(function(row) {
                    html += '<tr>';
                    row.forEach(function(cell) { html += '<td>' + String(cell ?? '').replace(/</g,'&lt;') + '</td>'; });
                    html += '</tr>';
                });
                html += '</tbody></table></div>';
                wrap.innerHTML = html;
            }).catch(function() { showMsg(msgId, 'Falha ao conectar.', true); wrap.innerHTML = ''; });
        }

                var headers = res.headers || [];
                var rows = res.rows || [];
                if (!rows.length) { wrap.innerHTML = '<p class="empty">Nenhum dado nesta aba.</p>'; return; }

                /* detecta colunas de quantidade e mínimo pelos cabeçalhos */
                var iQtd = -1, iMin = -1;
                headers.forEach(function(h, i) {
                    var hn = String(h).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
                    if (iQtd < 0 && /QTD|QUANTIDADE|QUANT|DISPON|ESTOQUE DISP/.test(hn)) iQtd = i;
                    if (iMin < 0 && /MIN/.test(hn)) iMin = i;
                });
                if (iQtd < 0) iQtd = 1; /* fallback: coluna B */

                var hasMin = iMin >= 0;

                function getStatus(row) {
                    var qty = parseFloat(String(row[iQtd] ?? '').replace(',','.'));
                    if (isNaN(qty)) return null;
                    var min = hasMin ? parseFloat(String(row[iMin] ?? '').replace(',','.')) : null;
                    if (hasMin && !isNaN(min) && min > 0) {
                        if (qty <= min)       return 'critico';
                        if (qty <= min * 2)   return 'medio';
                        return 'ok';
                    }
                    /* sem coluna mínimo — limiares fixos */
                    if (qty <= ESTOQUE_LIMIAR_CRITICO) return 'critico';
                    if (qty <= ESTOQUE_LIMIAR_MEDIO)   return 'medio';
                    return 'ok';
                }

                var badges = {
                    ok:      '<span class="estq-badge estq-ok">OK</span>',
                    medio:   '<span class="estq-badge estq-medio">MÉDIO</span>',
                    critico: '<span class="estq-badge estq-critico">CRÍTICO</span>'
                };
                var rowBg = {
                    ok:      '',
                    medio:   'background:rgba(245,158,11,.09);',
                    critico: 'background:rgba(239,68,68,.12);'
                };

                var html = '<div class="tableWrap"><table><thead><tr>';
                headers.forEach(function(c) { html += '<th>' + String(c||'').replace(/</g,'&lt;') + '</th>'; });
                html += '<th style="text-align:center;width:90px;">Status</th>';
                html += '</tr></thead><tbody>';

                rows.forEach(function(row) {
                    var st = getStatus(row);
                    html += '<tr style="' + (st ? rowBg[st] : '') + '">';
                    row.forEach(function(cell) { html += '<td>' + String(cell ?? '').replace(/</g,'&lt;') + '</td>'; });
                    html += '<td style="text-align:center;">' + (st ? badges[st] : '—') + '</td>';
                    html += '</tr>';
                });

                html += '</tbody></table></div>';

                /* legenda */
                var legendaDetalhe = hasMin
                    ? 'OK = acima de 2× o mínimo &nbsp;|&nbsp; Médio = até 2× o mínimo &nbsp;|&nbsp; Crítico = no mínimo ou abaixo'
                    : 'Limiares padrão: OK &gt; ' + ESTOQUE_LIMIAR_MEDIO + ' un. | Médio ≤ ' + ESTOQUE_LIMIAR_MEDIO + ' un. | Crítico ≤ ' + ESTOQUE_LIMIAR_CRITICO + ' un. (adicione coluna MÍNIMO na planilha para valores personalizados)';

                html += '<div class="estq-legenda">' +
                    '<span class="estq-leg-item"><span class="estq-dot" style="background:#22c55e;"></span>OK</span>' +
                    '<span class="estq-leg-item"><span class="estq-dot" style="background:#f59e0b;"></span>Médio</span>' +
                    '<span class="estq-leg-item"><span class="estq-dot" style="background:#ef4444;"></span>Crítico</span>' +
                    '<span class="estq-leg-detalhe">' + legendaDetalhe + '</span>' +
                '</div>';

                wrap.innerHTML = html;
            }).catch(function() { showMsg('estoqueMsg', 'Falha ao conectar.', true); wrap.innerHTML = ''; });
        }
        function carregarEntradas() { carregarAba('listar_entradas', 'entradasTableWrap', 'entradasMsg', 'Carregando entradas…'); }
        function carregarSaidas() { carregarAba('listar_saidas', 'saidasTableWrap', 'saidasMsg', 'Carregando saídas…'); }

        document.getElementById('btnRegistrarEntrada').addEventListener('click', function() {
            var outro = document.getElementById('entradaOutro');
            var produto = (outro && outro.value.trim()) ? outro.value.trim() : (document.getElementById('entradaProduto').value || '').trim();
            if (!produto) { showMsg('entradasMsg', 'Selecione um produto ou digite em "Ou digite outro".', true); return; }
            var dataInput = document.getElementById('entradaData');
            var data = dataInput ? dataInput.value : '';
            if (data) {
                var d = new Date(data);
                data = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
            }
            var qtd = document.getElementById('entradaQtd').value || '1';
            var resp = (document.getElementById('entradaResp') || {}).value || '';
            var btn = this;
            btn.disabled = true;
            api('registrar_entrada', { produto: produto, data: data, quantidade: qtd, responsavel: resp }).then(function(res) {
                btn.disabled = false;
                showMsg('entradasMsg', res.ok ? (res.message || 'Entrada registrada e estoque atualizado.') : (res.message || 'Erro'), !res.ok);
                if (res.ok) {
                    if (outro) outro.value = '';
                    carregarEntradas();
                    carregarEstoque();
                }
            }).catch(function() {
                btn.disabled = false;
                showMsg('entradasMsg', 'Falha ao conectar.', true);
            });
        });

        var opcoes = { disjuntores: [], cabos: [], eletrodutos: [], fases: [], hastes: [], produtos: [], produtos_entrada: [] };
        function carregarOpcoes() {
            return api('lista_opcoes').then(function(res) {
                if (res.ok) {
                    opcoes.disjuntores = res.disjuntores || [];
                    opcoes.cabos = res.cabos || [];
                    opcoes.eletrodutos = res.eletrodutos || [];
                    opcoes.fases = res.fases || [];
                    opcoes.hastes = res.hastes || [];
                    opcoes.produtos = res.produtos || [];
                    opcoes.produtos_entrada = res.produtos_entrada || res.produtos || [];
                }
                return res;
            });
        }
        function preencherDropdownEntrada() {
            var sel = document.getElementById('entradaProduto');
            if (!sel) return;
            sel.innerHTML = '<option value="">— Selecione —</option>';
            (opcoes.produtos_entrada || []).forEach(function(p) {
                sel.appendChild(new Option(p, p));
            });
            var hoje = new Date();
            var dataInput = document.getElementById('entradaData');
            if (dataInput && !dataInput.value) {
                dataInput.value = hoje.getFullYear() + '-' + String(hoje.getMonth() + 1).padStart(2, '0') + '-' + String(hoje.getDate()).padStart(2, '0');
            }
        }

        function preencherDropdownSaida() {
            var sel = document.getElementById('saidaProduto');
            if (!sel) return;
            sel.innerHTML = '<option value="">— Selecione —</option>';
            (opcoes.produtos_entrada || []).forEach(function(p) {
                sel.appendChild(new Option(p, p));
            });
            var hoje = new Date();
            var dataInput = document.getElementById('saidaData');
            if (dataInput && !dataInput.value) {
                dataInput.value = hoje.getFullYear() + '-' + String(hoje.getMonth() + 1).padStart(2, '0') + '-' + String(hoje.getDate()).padStart(2, '0');
            }
        }

        document.getElementById('btnRegistrarSaida').addEventListener('click', function() {
            var outro = document.getElementById('saidaOutro');
            var produto = (outro && outro.value.trim()) ? outro.value.trim() : (document.getElementById('saidaProduto').value || '').trim();
            if (!produto) { showMsg('saidasMsg', 'Selecione um produto ou digite em "Ou digite outro".', true); return; }
            var dataInput = document.getElementById('saidaData');
            var data = dataInput ? dataInput.value : '';
            if (data) {
                var d = new Date(data + 'T12:00:00');
                data = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
            }
            var qtd  = document.getElementById('saidaQtd').value  || '1';
            var resp = document.getElementById('saidaResp').value  || '';
            var obs  = document.getElementById('saidaObs').value   || '';
            this.disabled = true;
            var self = this;
            api('registrar_saida', { produto: produto, data: data, quantidade: qtd, responsavel: resp, observacao: obs })
                .then(function(res) {
                    self.disabled = false;
                    showMsg('saidasMsg', res.ok ? (res.message || 'Saída registrada!') : (res.message || 'Erro'), !res.ok);
                    if (res.ok) {
                        document.getElementById('saidaOutro').value = '';
                        document.getElementById('saidaQtd').value = '1';
                        document.getElementById('saidaResp').value = '';
                        document.getElementById('saidaObs').value = '';
                        carregarSaidas();
                        carregarEstoque();
                    }
                }).catch(function() {
                    self.disabled = false;
                    showMsg('saidasMsg', 'Falha ao conectar.', true);
                });
        });

        var resumosCache = [];
        var resumoOriginalTexto = '';

        function gerarResumoAtualizado() {
            var texto = resumoOriginalTexto;
            if (!texto) { showMsg('resumoMsg', 'Selecione um resumo primeiro.', true); return; }
            var camposEditaveis = ['Cabo','Disj Ca','Disj geral','Eletroduto','Fase','Haste','Horário','Instalação','Instalador'];
            camposEditaveis.forEach(function(label) {
                var paramName = label.replace(/\s/g, '_');
                var el = document.querySelector('[name="' + paramName + '"]') || document.getElementById('f_' + paramName);
                if (!el || !el.value) return;
                var val = el.value;
                var escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                var re = new RegExp('(' + escaped + ':)([^\n]*)', 'i');
                if (re.test(texto)) {
                    texto = texto.replace(re, '$1 ' + val);
                } else {
                    texto += '\n' + label + ': ' + val;
                }
            });
            var ta = document.getElementById('resumoTextoCompleto');
            ta.value = texto;
            ta.select();
            document.execCommand('copy');
            showMsg('resumoMsg', 'Resumo gerado e copiado!', false);
        }

        function carregarResumos() {
            var sel = document.getElementById('resumoSelect');
            sel.innerHTML = '<option value="">Carregando…</option>';
            api('listar_resumo').then(function(res) {
                resumosCache = (res.ok && res.itens) ? res.itens : [];
                sel.innerHTML = '<option value="">Selecione um resumo</option>';
                resumosCache.forEach(function(r) {
                    sel.appendChild(new Option((r.id || '') + ' – ' + (r.cliente || ''), r.id));
                });
            });
        }

        document.getElementById('resumoSelect').addEventListener('change', function() {
            var id = this.value;
            var wrap = document.getElementById('resumoFormWrap');
            if (!id) { wrap.style.display = 'none'; return; }
            wrap.style.display = 'block';
            document.getElementById('resumoForm').innerHTML = '<p class="empty">Carregando…</p>';
            api('resumo_por_id', { id: id }).then(function(res) {
                if (!res.ok) {
                    document.getElementById('resumoForm').innerHTML = '<p class="empty">' + (res.message || 'Erro') + '</p>';
                    document.getElementById('resumoTextoCompleto').value = '';
                    return;
                }
                resumoOriginalTexto = res.resumo || '';
                document.getElementById('resumoTextoCompleto').value = resumoOriginalTexto;
                var p = res.parsed || {};
                var parsedKey = { 'Cabo': 'cabo', 'Disj Ca': 'disj_ca', 'Disj geral': 'disj_geral', 'Eletroduto': 'eletroduto', 'Fase': 'fase', 'Haste': 'haste', 'Horário': 'horário', 'Instalação': 'instalacao', 'Instalador': 'instalador' };
                var fields = [
                    { key: 'Cabo', opts: opcoes.cabos },
                    { key: 'Disj Ca', opts: opcoes.disjuntores },
                    { key: 'Disj geral', opts: opcoes.disjuntores },
                    { key: 'Eletroduto', opts: opcoes.eletrodutos },
                    { key: 'Fase', opts: opcoes.fases },
                    { key: 'Haste', opts: opcoes.hastes },
                    { key: 'Horário', opts: [] },
                    { key: 'Instalação', opts: [] },
                    { key: 'Instalador', opts: [] }
                ];
                var html = '';
                fields.forEach(function(f) {
                    var paramName = f.key.replace(/\s/g, '_');
                    var val = p[parsedKey[f.key]] || '';
                    html += '<div class="form-group">';
                    html += '<label>' + f.key + '</label>';
                    if (f.opts && f.opts.length) {
                        html += '<select name="' + paramName + '" id="f_' + paramName + '" class="filter-select">';
                        html += '<option value="">—</option>';
                        f.opts.forEach(function(o) {
                            html += '<option value="' + (o||'').replace(/"/g,'&quot;') + '"' + (String(val).trim() === String(o).trim() ? ' selected' : '') + '>' + (o||'').replace(/</g,'&lt;') + '</option>';
                        });
                        html += '</select>';
                    } else {
                        html += '<input type="text" name="' + paramName + '" id="f_' + paramName + '" value="' + (val||'').replace(/"/g,'&quot;').replace(/</g,'&lt;') + '" placeholder="Texto livre">';
                    }
                    html += '</div>';
                });
                document.getElementById('resumoForm').innerHTML = html;
            });
        });

        document.getElementById('btnGerarResumo').addEventListener('click', gerarResumoAtualizado);

        document.getElementById('btnLiberar').addEventListener('click', function() {
            var id = document.getElementById('resumoSelect').value;
            if (!id) { showMsg('resumoMsg', 'Selecione um resumo.', true); return; }
            var params = { action: 'liberar', id: id };
            ['Cabo','Disj_Ca','Disj_geral','Eletroduto','Fase','Haste','Horário','Instalação','Instalador'].forEach(function(k) {
                var el = document.querySelector('[name="' + k.replace(/\s/g,'_') + '"]') || document.getElementById('f_' + k.replace(/\s/g,'_'));
                if (el) params[k.replace(/\s/g,'_')] = el.value || '';
            });
            this.disabled = true;
            api('liberar', params).then(function(res) {
                document.getElementById('btnLiberar').disabled = false;
                showMsg('resumoMsg', res.ok ? 'Liberado para separação.' : (res.message || 'Erro'), !res.ok);
                if (res.ok) carregarSeparacaoLista();
            }).catch(function() {
                document.getElementById('btnLiberar').disabled = false;
                showMsg('resumoMsg', 'Falha ao conectar.', true);
            });
        });

        var separacaoItens = [];
        var separacaoRowIndex = null;
        function carregarSeparacaoLista() {
            var sel = document.getElementById('separacaoSelect');
            sel.innerHTML = '<option value="">Carregando…</option>';
            api('separacao_lista').then(function(res) {
                var lista = (res.ok && res.itens) ? res.itens : [];
                sel.innerHTML = '<option value="">Selecione uma lista</option>';
                lista.forEach(function(it) {
                    sel.appendChild(new Option((it.cliente || '') + ' (linha ' + it.rowIndex + ')', it.rowIndex));
                });
                separacaoItens = lista;
            });
        }

        document.getElementById('separacaoSelect').addEventListener('change', function() {
            var rowIndex = this.value;
            var wrap = document.getElementById('separacaoListaWrap');
            if (!rowIndex) { wrap.style.display = 'none'; return; }
            separacaoRowIndex = parseInt(rowIndex, 10);
            var item = separacaoItens.find(function(i) { return String(i.rowIndex) === String(rowIndex); });
            if (!item) { wrap.style.display = 'none'; return; }
            document.getElementById('sepCliente').textContent = item.cliente || '';
            var linhas = String(item.itens || '').split('\n').filter(function(s) { return s.trim(); });
            var itensEdit = [];
            linhas.forEach(function(linha) {
                var m = linha.trim().match(/^(\d+(?:[.,]\d+)?)\s*(?:M\s+)?(.+)$/) || linha.trim().match(/^(.+)$/);
                if (m) itensEdit.push({ qtd: m[1] || '1', nome: (m[2] || m[1] || linha).trim() });
                else itensEdit.push({ qtd: '1', nome: linha.trim() });
            });
            renderSepLista(itensEdit);
            wrap.style.display = 'block';
        });

        function renderSepLista(itensEdit) {
            var container = document.getElementById('separacaoLista');
            var produtos = opcoes.produtos.length ? opcoes.produtos.slice() : ['DISJUNTOR MONO 16A','DISJUNTOR MONO 20A','CABO FLEXÍVEL 4MM'];
            itensEdit.forEach(function(it) {
                var n = (it.nome || '').trim();
                if (n && produtos.indexOf(n) === -1) produtos.push(n);
            });
            produtos.sort();
            container.innerHTML = '';
            itensEdit.forEach(function(it, idx) {
                var div = document.createElement('div');
                div.className = 'sep-row';
                div.innerHTML =
                    '<input type="number" min="0" step="1" data-idx="' + idx + '" value="' + (it.qtd||'1').replace(/"/g,'&quot;') + '">' +
                    '<select class="filter-select" data-idx="' + idx + '">' +
                    produtos.map(function(p) {
                        return '<option value="' + (p||'').replace(/"/g,'&quot;') + '"' + (String(it.nome).trim() === String(p).trim() ? ' selected' : '') + '>' + (p||'').replace(/</g,'&lt;') + '</option>';
                    }).join('') +
                    '</select>' +
                    '<button type="button" class="btn-remove" data-idx="' + idx + '" data-remove>−</button>';
                container.appendChild(div);
                div.querySelector('[data-remove]').addEventListener('click', function() {
                    itensEdit.splice(parseInt(this.getAttribute('data-idx'),10), 1);
                    renderSepLista(itensEdit);
                });
            });
            container.querySelectorAll('input[type="number"]').forEach(function(inp) {
                inp.addEventListener('input', function() { itensEdit[parseInt(this.getAttribute('data-idx'),10)].qtd = this.value; });
            });
            container.querySelectorAll('select').forEach(function(sel) {
                sel.addEventListener('change', function() { itensEdit[parseInt(this.getAttribute('data-idx'),10)].nome = this.value; });
            });
            var addBtn = document.createElement('button');
            addBtn.type = 'button';
            addBtn.className = 'btn-add-item';
            addBtn.textContent = '+ Adicionar item';
            addBtn.onclick = function() {
                itensEdit.push({ qtd: '1', nome: produtos[0] || '' });
                renderSepLista(itensEdit);
            };
            container.appendChild(addBtn);
            window._sepItensEdit = itensEdit;
        }

        document.getElementById('btnSalvarSep').addEventListener('click', function() {
            var itens = window._sepItensEdit;
            if (!separacaoRowIndex || !itens || !itens.length) { showMsg('separacaoMsg', 'Nenhum item para salvar.', true); return; }
            this.disabled = true;
            api('separacao_atualizar', { rowIndex: separacaoRowIndex, itens_json: JSON.stringify(itens) }).then(function(res) {
                document.getElementById('btnSalvarSep').disabled = false;
                showMsg('separacaoMsg', res.ok ? 'Lista atualizada.' : (res.message || 'Erro'), !res.ok);
                if (res.ok) carregarSeparacaoLista();
            }).catch(function() {
                document.getElementById('btnSalvarSep').disabled = false;
                showMsg('separacaoMsg', 'Falha ao conectar.', true);
            });
        });

        document.getElementById('btnCopiarSep').addEventListener('click', function() {
            var cliente = document.getElementById('sepCliente').textContent.trim();
            var rows = document.querySelectorAll('#separacaoLista .sep-row');
            if (!rows.length) { showMsg('separacaoMsg', 'Nenhum item para copiar.', true); return; }
            var linhas = ['Separação — ' + cliente, ''];
            rows.forEach(function(row) {
                var qtdEl  = row.querySelector('input[type="number"]');
                var itemEl = row.querySelector('select') || row.querySelector('input[type="text"]');
                var qtd  = qtdEl  ? qtdEl.value.trim()  : '';
                var item = itemEl ? (itemEl.tagName === 'SELECT' ? itemEl.options[itemEl.selectedIndex].text : itemEl.value).trim() : '';
                if (item) linhas.push('• ' + qtd + 'x ' + item);
            });
            var texto = linhas.join('\n');
            navigator.clipboard.writeText(texto).then(function() {
                var btn = document.getElementById('btnCopiarSep');
                var orig = btn.textContent;
                btn.textContent = '✅ Copiado!';
                setTimeout(function() { btn.textContent = orig; }, 2000);
            }).catch(function() {
                showMsg('separacaoMsg', 'Não foi possível copiar. Tente em HTTPS.', true);
            });
        });

        document.getElementById('btnAprovarSep').addEventListener('click', function() {
            if (!separacaoRowIndex) { showMsg('separacaoMsg', 'Selecione uma lista.', true); return; }
            this.disabled = true;
            api('separacao_marcar_sim', { rowIndex: separacaoRowIndex }).then(function(res) {
                document.getElementById('btnAprovarSep').disabled = false;
                showMsg('separacaoMsg', res.ok ? 'Marcado como separado.' : (res.message || 'Erro'), !res.ok);
                if (res.ok) carregarSeparacaoLista();
            }).catch(function() {
                document.getElementById('btnAprovarSep').disabled = false;
                showMsg('separacaoMsg', 'Falha ao conectar.', true);
            });
        });

        carregarOpcoes().then(function() {
            preencherDropdownEntrada();
            carregarEstoque();
            carregarResumos();
            carregarSeparacaoLista();
        });
    </script>
</body>
</html>
